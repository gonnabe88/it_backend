plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.5'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'org.asciidoctor.jvm.convert' version '4.0.5'
	id 'jacoco'
}

group = 'com.kdb'
version = '0.0.1-SNAPSHOT'
description = 'Demo project for Spring Boot'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

// Snyk 취약점 대응 — 전이 의존성 강제 버전 업그레이드
configurations.all {
	resolutionStrategy.eachDependency { details ->
		// com.fasterxml.jackson.core: 강제 버전 지정 제거 — Gradle 자연 해소에 위임
		// tools.jackson:jackson-bom:3.1.0이 선언한 버전(2.19+)이 JsonSerializeAs 등 신규 클래스를 포함
		// 강제 다운그레이드 시 tools.jackson.databind:3.1.0 런타임 NoClassDefFoundError 발생
		// jjwt-jackson 2.12.7.1은 swagger-core가 요구하는 상위 버전으로 자동 업그레이드됨 (Snyk 대응)
		// logback 1.5.22 → 1.5.32 (Low 1건)
		if (details.requested.group == 'ch.qos.logback') {
			details.useVersion '1.5.32'
			details.because 'Snyk SNYK-JAVA-CHQOSLOGBACK-15062482 취약점 대응'
		}
		// spring-web/webmvc 7.0.1 → 7.0.6 (High 1건 + Low 2건, Spring Boot BOM 미적용 시 fallback)
		if (details.requested.group == 'org.springframework') {
			details.useVersion '7.0.6'
			details.because 'Snyk SNYK-JAVA-ORGSPRINGFRAMEWORK-* 취약점 대응 (7.0.6 안전 버전)'
		}
	}
}

ext {
	set('snippetsDir', file("build/generated-snippets"))
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-actuator'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.3'
	
	// HTML 새니타이징 (XSS 서버 측 방어)
	implementation 'org.jsoup:jsoup:1.18.3'

	// JWT
	implementation 'io.jsonwebtoken:jjwt-api:0.13.0'
	runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.13.0'
	runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.13.0'
	
	// QueryDSL — 5.1.0으로 업그레이드 (Snyk SNYK-JAVA-COMQUERYDSL-8400287 SQL Injection 대응)
	implementation 'com.querydsl:querydsl-jpa:5.1.0:jakarta'
	annotationProcessor 'com.querydsl:querydsl-apt:5.1.0:jakarta'
	annotationProcessor 'jakarta.persistence:jakarta.persistence-api'
	annotationProcessor 'jakarta.annotation:jakarta.annotation-api'

	compileOnly 'org.projectlombok:lombok'
	developmentOnly 'org.springframework.boot:spring-boot-devtools'
	runtimeOnly 'com.oracle.database.jdbc:ojdbc11'
	annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
	annotationProcessor 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-restdocs'
	testImplementation 'org.springframework.boot:spring-boot-starter-actuator-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-data-jpa-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-security-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testImplementation 'org.springframework.restdocs:spring-restdocs-mockmvc'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

// ── JaCoCo 커버리지 설정 ──────────────────────────────────────────────
jacoco {
	// Java 25 바이트코드 지원 버전 — Spring Boot BOM 관리 버전 사용
	toolVersion = "0.8.13"
}

// 커버리지 측정 제외 대상 (측정 의미가 낮은 클래스)
def jacocoExcludes = [
	'**/Q*.class',                  // QueryDSL 자동 생성 Q클래스
	'**/ItApplication.class',       // 애플리케이션 진입점
	'**/*Config*.class',            // Spring 설정 클래스
	'**/*Properties*.class',        // @ConfigurationProperties
	'**/*Dto*.class',               // DTO (정적 중첩 포함)
	'**/*Dto$*.class',              // DTO 정적 중첩 클래스
	'**/*Entity*.class',            // JPA 엔티티 (Lombok 처리)
	'**/entity/**',                 // entity 패키지 전체
	'**/exception/**',              // 예외 클래스 패키지
	'**/infra/ai/**',               // 외부 Gemini AI 연동
	'**/repository/**',             // Repository 인터페이스 및 QueryDSL 구현체
	'**/domain/log/**',             // 감사로그 인프라 (이벤트 기반 — 통합 테스트 대상)
]

jacocoTestReport {
	dependsOn test
	reports {
		xml.required  = true   // CI/CD 파이프라인 통합용
		html.required = true   // 로컬 리포트: build/reports/jacoco/test/html/index.html
		csv.required  = false
	}
	afterEvaluate {
		classDirectories.setFrom(files(classDirectories.files.collect {
			fileTree(dir: it, exclude: jacocoExcludes)
		}))
	}
}

jacocoTestCoverageVerification {
	afterEvaluate {
		classDirectories.setFrom(files(classDirectories.files.collect {
			fileTree(dir: it, exclude: jacocoExcludes)
		}))
	}
	violationRules {
		rule {
			limit {
				// 현재 단계 목표: 60% (추후 80%로 상향 예정)
				minimum = 0.60
			}
		}
		rule {
			element = 'CLASS'
			limit {
				counter = 'LINE'
				value   = 'COVEREDRATIO'
				minimum = 0.50
			}
		}
	}
}
// ─────────────────────────────────────────────────────────────────────

tasks.named('test') {
	outputs.dir snippetsDir
	useJUnitPlatform()
	// 테스트 완료 후 자동으로 커버리지 리포트 생성
	finalizedBy jacocoTestReport
}

tasks.named('asciidoctor') {
	inputs.dir snippetsDir
	dependsOn test
}

tasks.withType(JavaCompile) {
	options.encoding = 'UTF-8'
	options.compilerArgs.add("-parameters")
}

tasks.withType(Javadoc) {
	options.encoding = 'UTF-8'
}


