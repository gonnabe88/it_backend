spring.application.name=it

# Oracle Database Configuration
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=ITPAPP
spring.datasource.password=kdb1234!!
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Logging
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration
jwt.secret=kdb-it-secret-key-for-jwt-token-generation-and-validation-must-be-at-least-256-bits
jwt.access-token-validity=900000
jwt.refresh-token-validity=604800000

# Cookie Configuration
# 쿠키 Secure 플래그 (개발: false, 운영: true)
app.cookie.secure=false

# CORS Configuration
# 개발 환경: http://localhost:3000 (프론트엔드 주소)
# 운영 환경: 실제 프론트엔드 도메인으로 변경 (예: https://itportal.kdb.com)
cors.allowed-origins=http://localhost:3000
