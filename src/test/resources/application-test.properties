# Oracle DataSource 자동 설정 제외 (단위 테스트 - DB 연결 불필요)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration,\
  org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration

# JWT 테스트용 고정 시크릿 키 (256bit 이상 필수)
jwt.secret=test-secret-key-for-junit-test-minimum-256-bits-length-ok
jwt.access-token-validity=900000
jwt.refresh-token-validity=604800000

# Gemini API (테스트 환경 - 더미값으로 빈 바인딩 오류 방지)
gemini.api.key=test-dummy-key
gemini.api.model=gemini-2.5-flash
gemini.api.base-url=https://generativelanguage.googleapis.com

# 쿠키 설정
app.cookie.secure=false

# CORS
cors.allowed-origins=http://localhost:3000
